# Cloudflare Pages + R2 configuration
# Bind the VIDEOS bucket in the Pages dashboard if not picked up automatically:
#   Pages → your project → Settings → Functions → R2 bucket bindings
#   Variable name: VIDEOS  |  Bucket: priscillapetty-videos

name = "priscillapetty-website"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

[[r2_buckets]]
binding = "VIDEOS"
bucket_name = "priscillapetty-videos"
